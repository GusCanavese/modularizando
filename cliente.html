<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meus Processos em Aberto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
     
  </head>
  <body class="bg-light">
    <header class="bg-white border-bottom shadow-sm">
      <div class="container py-3 d-flex justify-content-between align-items-center" >
        <div>
          <h1 class="h4 mb-0 fw-semibold text-primary">Processos do Cliente</h1>
          <p class="text-muted mb-0"> Visualize e atualize apenas suas solicitações em aberto. </p>
          <p class="text-muted mb-0" id="nome-usuario-cabecalho">Usuário: -</p>
        </div>
        <div class="d-flex gap-2">
          <a href="login.html" class="btn btn-outline-secondary" id="btn-trocar-usuario-cliente" >Trocar usuário</a>
        </div>
      </div>
    </header>

    <main class="container py-4" id="pagina-cliente">
      <div class="row mb-3">
        <div class="col-12 col-lg-8">
          <div class="alert alert-info mb-0">
            Após o login, somente os Processos abertos vinculados ao seu usuário
            serão exibidos para edição.
          </div>
        </div>
      </div>
      <div class="row g-3" id="lista-Processos-cliente"></div>
    </main>

    <footer class="border-top bg-white py-3 mt-4">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="text-muted small">Central de Processos - Cliente</span>
        <span class="text-muted small">Apenas Processos em aberto</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
     
  </body>
</html>
